<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Contact | Cascade Alliance</title>
    <meta name="description" content="Start a conversation about business, brand, digital products, AI, experiences, or growth.">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="cursor" aria-hidden="true"></div>
    <header class="site-header is-solid" data-header>
      <a class="brand" href="index.html" aria-label="Home"><span class="brand-mark"></span><span>Cascade Alliance</span></a>
      <nav class="nav" aria-label="Primary">
        <a href="about.html">About</a>
        <a href="approach.html">Approach</a>
        <a href="projects.html">Projects</a>
        <a href="journal.html">Journal</a>
        
      </nav>
      <a class="header-cta" href="contact.html">Start a conversation</a>
    </header>

    <main>
      <section class="contact-page reveal-zone">
        <img class="contact-bg contact-bg-mono" src="assets/contact-studio.png" alt="Evening studio entrance and workspace">
        <img class="contact-bg contact-bg-color" src="assets/contact-studio.png" alt="">
        <div class="contact-page-copy">
          <p class="eyebrow">Contact</p>
          <h1>Bring us a question, a plan, or a vague feeling.</h1>
          <p>You do not need a perfect brief. Tell us what you are trying to move, what feels stuck, or what might be possible.</p>
          <p class="contact-direct">Prefer email? Write to <a href="mailto:contact@cascade-alliance.com">contact@cascade-alliance.com</a>.</p>
        </div>
        <form class="contact-form">
          <label><span>Name</span><input type="text" name="name" autocomplete="name"></label>
          <label><span>Email</span><input type="email" name="email" autocomplete="email"></label>
          <label>
            <span>Topic</span>
            <select name="topic">
              <option>An undefined question</option>
              <option>Business or brand</option>
              <option>Website or app</option>
              <option>AI adoption or operations</option>
              <option>Physical or service experience</option>
              <option>Marketing and growth</option>
            </select>
          </label>
          <label><span>Message</span><textarea name="message" rows="7"></textarea></label>
          <button type="button">Review message</button>
        </form>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
